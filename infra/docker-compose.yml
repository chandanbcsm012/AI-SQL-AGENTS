# Core open-source infra stack for SQL_AGENTS (see ../docs/IMPLEMENTATION_PLAN.md).
# Everything here is self-hosted/OSS -- no managed/cloud services, no accounts.
#
# Usage:
#   cd infra && docker compose up -d
#   docker compose ps
#
# Heavier multi-container apps (Langfuse, GlitchTip, PostHog, Keycloak) are
# intentionally not included here -- pull in their own official compose files
# when that phase of docs/IMPLEMENTATION_PLAN.md is reached.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sqlagents
      POSTGRES_PASSWORD: sqlagents
      POSTGRES_DB: sqlagents
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sqlagents
      MINIO_ROOT_PASSWORD: sqlagents123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:latest
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  postgres_data:
  valkey_data:
  qdrant_data:
  minio_data:
  tempo_data:
  prometheus_data:
  loki_data:
  grafana_data:
